name: Micromechanics EVPFFT Regression Tests (Ubuntu)

on:
  push:
    branches: [ main, CMake_build ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  regression-tests:
    name: EVPFFT Regression Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: OpenMP Release
            kokkos_build_type: openmp
            omp_threads: 2
            build_args: --heffte_build_type=fftw --kokkos_build_type=openmp --build_fftw --build_hdf5
          - name: Serial Release
            kokkos_build_type: serial
            omp_threads: 1
            build_args: --heffte_build_type=fftw --kokkos_build_type=serial --build_fftw --build_hdf5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            git \
            python3 \
            python3-pip \
            libopenmpi-dev \
            openmpi-bin \
            libfftw3-dev \
            libfftw3-mpi-dev \
            libhdf5-openmpi-dev

      - name: Build EVPFFT via project build script
        run: |
          cd apps/micromechanics/EVPFFT
          chmod +x ./scripts/build_scripts/build_evpfft.sh
          ./scripts/build_scripts/build_evpfft.sh ${{ matrix.build_args }} --num_jobs=$(nproc)

      - name: Run micromechanics regression suite
        env:
          OMP_NUM_THREADS: ${{ matrix.omp_threads }}
        run: |
          EVPFFT_BINARY="apps/micromechanics/EVPFFT/evpfft_fftw_${{ matrix.kokkos_build_type }}/evpfft"
          if [ ! -x "$EVPFFT_BINARY" ]; then
            echo "Expected EVPFFT binary not found: $EVPFFT_BINARY"
            exit 1
          fi

          if [ -f apps/micromechanics/regression_tests/run_regression_tests.py ]; then
            cd apps/micromechanics/regression_tests
            python3 run_regression_tests.py \
              --binary "../EVPFFT/evpfft_fftw_${{ matrix.kokkos_build_type }}/evpfft" \
              --suite evpfft \
              --expected-results expected_results/evpfft
          else
            echo "Micromechanics regression suite not found yet."
            echo "Expected path: apps/micromechanics/regression_tests/run_regression_tests.py"
            echo "Running EVPFFT smoke test instead."
            cd apps/micromechanics/EVPFFT
            cp example_input_files/example_evpfft_standalone_inputfile.txt ./ci_evpfft_input.txt
            sed -i "s|/absolute/path/to/random_microstructure_8x8x8.txt|$PWD/example_input_files/random_microstructure_8x8x8.txt|g" ./ci_evpfft_input.txt
            sed -i "s|/absolute/path/to/example_plastic_parameters.txt|$PWD/example_input_files/example_plastic_parameters.txt|g" ./ci_evpfft_input.txt
            sed -i "s|/absolute/path/to/example_elastic_parameters.txt|$PWD/example_input_files/example_elastic_parameters.txt|g" ./ci_evpfft_input.txt
            "./evpfft_fftw_${{ matrix.kokkos_build_type }}/evpfft" --infile=./ci_evpfft_input.txt
          fi
