name: Regression Tests (NVHPC)

on:
  push:
    branches: [ main, CMake_build ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Regression-Tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Serial
            cmake_args: -DFIERRO_ENABLE_OPENMP=OFF
            omp_threads: 1
          - name: OpenMP
            cmake_args: -DFIERRO_ENABLE_OPENMP=ON
            omp_threads: 2

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1

    # REPLACEMENT: Install the actual HPC SDK instead of using setup-mpi
    - name: Install NVHPC SDK
      uses: nvidia/hpc-sdk-action@v1
      with:
        hpc_sdk_version: '24.1'
        hpc_sdk_components: 'compilers,mpi'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libblas-dev liblapack-dev python3 bison flex

    - name: Configure CMake
      # Using the MPI wrappers provided by NVHPC ensures correct linking
      env:
        CC: mpicc
        CXX: mpicxx
        FC: mpifort
      run: |
        mkdir -p apps/multiphysics/build
        cd apps/multiphysics/build
        # Added -DFIERRO_ENABLE_MPI=ON since you are using an MPI stack
        cmake -DCMAKE_BUILD_TYPE=Release -DFIERRO_ENABLE_MPI=ON ${{ matrix.cmake_args }} ..

    - name: Build Fierro
      run: |
        cd apps/multiphysics/build
        make -j$(nproc)

    - name: Run Regression Tests
      env:
        OMP_NUM_THREADS: ${{ matrix.omp_threads }}
      run: |
        cd apps/multiphysics/regression_tests
        # Ensure MPI tests run correctly with mpirun if needed by your script
        python3 test_refactor.py