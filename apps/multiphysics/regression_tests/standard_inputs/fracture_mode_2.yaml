dynamic_options:
  time_final: 38.5
  dt_min: 1e-8
  dt_max: 1e-2
  dt_start: 1.e-5
  dt_cfl: 0.8
  rk_num_stages: 2
  cycle_stop: 10000

mesh_options:
  source: file
  file_path: meshes/fracture_mode_2.vtk
  num_dims: 3

output_options:
  timer_output_level: thorough
  output_file_format: state
  graphics_time_step: 38.5

solver_options:
  - solver:
      method: dynx_FE
      id: 0

boundary_conditions:
  # fracture stress boundary condition
  - boundary_condition:
      solver_id: 0
      surface:
        type: global
      stress_model: fracture
      stress_bc_global_vars:
        - 2.0e-3   # E_inf (Prony constant term) [Mbar]
        - 0.025    # a1 (Damage evolution coefficient) [dimensionless]
        - 0.25     # n_exp (Damage evolution exponent) [dimensionless]
        - 1.0e-2   # u_n_star (uns: Characteristic length normal) [cm]
        - 1.0e-2   # u_t_star (uts: Characteristic length tangential) [cm]
        - 1        # num_prony_terms (Filled below: # E and tau temrs)
        - 1.8e-2   # prony_0_E [Mbar]
        - 2.0      # prony_0_tau [us]
                   # prony_1_E (set by num_prony_terms)
                   # prony_1_tau (set by num_prony_terms)

  # Tag y plane (restrain poisson effect)
  - boundary_condition:
      solver_id: 0
      surface: 
          type: y_plane
          plane_position: 0.0
      velocity_model: reflected
      velocity_bc_global_vars:
          - 0
          - 1
          - 0

  # Tag y plane (restrain poisson effect)
  - boundary_condition:
      solver_id: 0
      surface: 
          type: y_plane
          plane_position: 0.1
      velocity_model: reflected
      velocity_bc_global_vars:
          - 0
          - 1
          - 0
          
  # Tag Z plane (constrain z velocity; forces pure in-plane sliding)
  - boundary_condition:
      solver_id: 0
      surface: 
          type: z_plane
          plane_position: 0.1 # at crack interface
      velocity_model: reflected
      velocity_bc_global_vars:
          - 0
          - 0
          - 1

  # Tag z plane (bottom surface z=0 velocity in -x direction)
  - boundary_condition:
      solver_id: 0
      surface:
        type: z_plane
        plane_position: 0.0
      velocity_model: piston
      velocity_bc_global_vars:
        - 1 # x
        - 0 # y
        - 0 # z
        - -5.0e-4 #  hydro_bc_vel_0 
        - 0.0 # hydro_bc_vel_1 
        - 0.0 # hydro_bc_vel_2 
        - 0.0 # t_start
        - 38.5 # t_end

  # Tag z plane (top surface z=0.2 velocity in +x direction)
  - boundary_condition:
      solver_id: 0
      surface:
        type: z_plane
        plane_position: 0.2
      velocity_model: piston
      velocity_bc_global_vars:
        - 1 # x
        - 0 # y
        - 0 # z
        - 5.0e-4 # hydro_bc_vel_0 
        - 0.0 # hydro_bc_vel_1 
        - 0.0 # hydro_bc_vel_2 
        - 0.0 # t_start 
        - 38.5    # t_end

materials:
  - material:
      id: 0
      eos_model_type: decoupled
      eos_model: linear_elastic_eos
      eos_global_vars:
          - 1.30 # B from Azo materials online
          - 0.4333 # G from Azo materials online
          - 1.0 # ref density from Azo materials online
          - 0.001

        #------Strength
      strength_model_type: increment_based
      strength_model: hypo_plasticity_strength
      # shear modulus of copper
      # yield strength of copper
      strength_global_vars:
          - 0.4333
          - 0.004

      dissipation_model: MARS
      dissipation_global_vars:
          - 3.0   # q1
          - 1.0   # q1ex
          - 3.0 # q2 shear dissipation
          - 1.333 # q2ex
          - 0.1     # phi_min
          - 1.0   # phi_curl

regions:
  # Bottom element: z=[0,0.1], sliding in -x at piston speed
  - region:
      volume:
        type: box
        x1: -10.0
        x2: 10.0
        y1: -10.0
        y2: 10.0
        z1: -10.0
        z2: 0.1
      material_id: 0
      solver_id: 0
      density:
        type: uniform
        value: 1.0
      specific_internal_energy:
        type: uniform
        value: 1.0e-10
      velocity:
        type: cartesian
        u: -5.0e-4
        v: 0.0
        w: 0.0

  # Top element: z=[0.1,0.2], sliding in +x at piston speed
  - region:
      volume:
        type: box
        x1: -10.0
        x2: 10.0
        y1: -10.0
        y2: 10.0
        z1: 0.1
        z2: 10.0
      material_id: 0
      solver_id: 0
      density:
        type: uniform
        value: 1.0
      specific_internal_energy:
        type: uniform
        value: 1.0e-10
      velocity:
        type: cartesian
        u: 5.0e-4
        v: 0.0
        w: 0.0

