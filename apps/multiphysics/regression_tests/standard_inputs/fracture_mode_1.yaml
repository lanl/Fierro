# num_dims: 3

dynamic_options:
  time_final: 4.0
  dt_min: 1e-6
  dt_max: 0.001
  dt_start: 1.e-5
  cycle_stop: 300000


mesh_options:
  source: file
  file_path: meshes/fracture_mode_1.vtk
  num_dims: 3

output_options:
  timer_output_level: thorough
  output_file_format: state
  graphics_time_step: 2.0
  # graphics_iteration_step: 10

solver_options:
  - solver:
      method: dynx_FE
      id: 0
      # solver_vars:
      #  - blah
      #  - blah
      #  - blah

boundary_conditions:
  # fracture stress boundary condition
  - boundary_condition:
      solver_id: 0
      surface:
        type: global
      stress_model: fracture
      stress_bc_global_vars:
        - 2.0e-3   #g/cm*us^2 #E_inf (Prony constant term)
        - 0.025    #a1 (Damage evolution coefficient) dimensionless
        - 0.25        #n_exp (Damage evolution exponent) dimensionless
        - 1.0e-2   #cm  #u_n_star (uns: Characteristic length normal) larger = less sensitive to normal opening
        - 5.0e-2   #cm   #u_t_star (uts: Characteristic length tangential)
        - 1        #num_prony_terms (Filled below: E and tau temrs) dimensionless
        - 1.8e-2   #g/cm*us^2   #prony_0_E
        - 2.0      #g/cm*us^3    #prony_0_tau p
                   #prony_1_E
                   #prony_1_tau

  # Tag z plane (bottom surface z=0 velocity in -z direction)
  - boundary_condition:
      solver_id: 0
      surface:
        type: z_plane
        plane_position: 0.0
      velocity_model: piston
      velocity_bc_global_vars:
        - 0 # x
        - 0 # y
        - 1 # z
        - 0.0 # hydro_bc_vel_0 
        - 0.0 # hydro_bc_vel_1 
        - -5.0e-2 # hydro_bc_vel_2 
        - 0.0 # t_start
        - 4.0 # t_end

  # Tag z plane (top surface z=2 velocity in +z direction)
  - boundary_condition:
      solver_id: 0
      surface:
        type: z_plane
        plane_position: 2.0
      velocity_model: piston
      velocity_bc_global_vars:
        - 0 # x
        - 0 # y
        - 1 # z
        - 0.0 # hydro_bc_vel_0 
        - 0.0 # hydro_bc_vel_1 
        - 5.0e-2 # hydro_bc_vel_2 
        - 0.0 # t_start 
        - 4.0    # t_end

materials:
  - material:
      id: 0
      eos_model_type: decoupled
      eos_model: linear_elastic_eos
      eos_global_vars:
          - 1.30 # B from Azo materials online
          - 0.4333 # G from Azo materials online
          - 1.0 # ref density from Azo materials online
          - 0.001

        #------Strength
      strength_model_type: increment_based
      strength_model: hypo_plasticity_strength
      # shear modulus of copper
      # yield strength of copper
      strength_global_vars:
          - 0.4333
          - 0.004

      dissipation_model: MARS
      dissipation_global_vars:
          - 5.0   # q1
          - 1.0   # q1ex
          - 3.0 # q2 shear dissipation
          - 1.333 # q2ex
          - 0.1     # phi_min
          - 1.0   # phi_curl
      eos_global_vars:
          - 10 #1.666666666666667
          - 1.0E-14
          - 1.0

regions:
  - region:
        volume:
            type: global
        material_id: 0
        solver_id: 0
        density: 
            type: uniform
            value: 1
        specific_internal_energy: 
            type: uniform
            value: 1.0e-10
        velocity: 
            type: cartesian
            u: 0.0
            v: 0.0
            w: 0.0

