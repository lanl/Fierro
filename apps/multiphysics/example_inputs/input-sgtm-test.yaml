# ---------------------------------------------------------------------------
# Example Fierro input: SGTM test (constant bottom temperature)
#
# This example solves a transient staggered-grid thermal problem
# (`thrmex_FE` / SGTM3D) over a simple box domain.
#
# The main feature is the bottom boundary condition:
# - `boundary_conditions[].temperature_model: constant` on `z_plane`
#   at `plane_position: 0.0`, with `temperature_bc_global_vars` specifying
#   a fixed boundary temperature.
#
# Other faces are thermalized using:
# - `temperature_model: convection` (reference temperature + h)
# - `temperature_model: radiation` (radiative exchange)
#
# Implementation detail / caveat (from `SGTM3D::boundary_convection` and
# `SGTM3D::boundary_radiation`):
# - Convection and radiation currently use internal hard-coded parameters
#   in SGTM3D’s boundary implementation, so the YAML
#   `temperature_bc_global_vars` values for those models may not affect the
#   result until the solver is updated to read them.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Time integration / stepping control
# ---------------------------------------------------------------------------
dynamic_options:
    time_final: 1.0
    dt_min: 1.e-8
    dt_max: 1.0
    dt_start: 1.e-5
    cycle_stop: 100000



# mesh_options (alternative: generate from an external file)
#
# mesh_options:
#     source: file
#     file_path: /var/tmp/repos/Fierro/fork/Fierro/testing/meshes/mesh_Sedov_8.geo

# ---------------------------------------------------------------------------
# Mesh options
# ---------------------------------------------------------------------------
mesh_options:
    source: generate
    num_dims: 3
    type: box
    origin: [0.0, 0.0, 0.0]
    length: [10.0, 10.0, 1.0]
    num_elems: [100, 100, 10]


# ---------------------------------------------------------------------------
# Output / visualization controls
# ---------------------------------------------------------------------------
output_options:
    timer_output_level: thorough
    output_file_format: viz
    graphics_time_step: 0.01
    #graphics_iteration_step: 5
    elem_field_outputs:
        - den
        - mass
    mat_pt_field_outputs:
        - den
    node_field_outputs:
        - temp

# ---------------------------------------------------------------------------
# Solver configuration
# ---------------------------------------------------------------------------
solver_options:
  - solver:
        method: thrmex_FE
        id: 0
        use_moving_heat_source: false
        # solver_vars:
        #  - blah
        #  - blah
        #  - blah

# ---------------------------------------------------------------------------
# Boundary conditions (temperature BCs)
# ---------------------------------------------------------------------------
boundary_conditions:
    # Constant temperature on the bottom plane (`z = 0`)
    - boundary_condition:
        solver_id: 0
        surface:
            type: z_plane
            plane_position: 0.0
        temperature_model: constant
        temperature_bc_global_vars:
            # `temperature_model: constant` uses `temperature_bc_global_vars`
            # as `[T]` (only index 0 is consumed).
            - 693.15   # fixed boundary temperature (K)

    # Convection on the top and side faces (reference + h)
    - boundary_condition:
        solver_id: 0
        surface:
            type: z_plane
            plane_position: 1.0
        temperature_model: convection
        temperature_bc_global_vars:
            # Intended convection form: `temperature_bc_global_vars = [T_ref, h]`.
            # In the current SGTM3D implementation, convection coefficients are
            # not taken from YAML globals (hard-coded internally).
            - 293.15   # reference temperature (K)
            - 100.0    # h (film temperature / convection coefficient)

    - boundary_condition:
        solver_id: 0
        surface:
            type: x_plane
            plane_position: 0.0
        temperature_model: convection
        temperature_bc_global_vars:
            - 293.15   # reference temperature (room temp in kelvin)
            - 100.0    # h (film temperature)
    - boundary_condition:
        solver_id: 0
        surface:
            type: x_plane
            plane_position: 10.0
        temperature_model: convection
        temperature_bc_global_vars:
            - 293.15   # reference temperature (room temp in kelvin)
            - 100.0    # h (film temperature)

    - boundary_condition:
        solver_id: 0
        surface:
            type: y_plane
            plane_position: 0.0
        temperature_model: convection
        temperature_bc_global_vars:
            - 293.15   # reference temperature (room temp in kelvin)
            - 100.0    # h (film temperature)

    - boundary_condition:
        solver_id: 0
        surface:
            type: y_plane
            plane_position: 10.0
        temperature_model: convection
        temperature_bc_global_vars:
            - 293.15   # reference temperature (room temp in kelvin)
            - 100.0    # h (film temperature)

    - boundary_condition:
        solver_id: 0
        surface:
            type: z_plane
            plane_position: 10.0
        temperature_model: convection
        temperature_bc_global_vars:
            - 293.15   # reference temperature (room temp in kelvin)
            - 100.0    # h (film temperature)


    # Radiation on the non-constant temp surfaces
    #
    # NOTE: SGTM3D’s radiation implementation currently uses hard-coded
    # emissivity / ambient parameters internally (it does not read YAML
    # radiation-specific global vars in this example).
    - boundary_condition:
        solver_id: 0
        surface:
            type: x_plane
            plane_position: 0.0
        temperature_model: radiation

    - boundary_condition:
        solver_id: 0
        surface:
            type: x_plane
            plane_position: 10.0
        temperature_model: radiation

    - boundary_condition:
        solver_id: 0
        surface:
            type: y_plane
            plane_position: 0.0
        temperature_model: radiation    

    - boundary_condition:
        solver_id: 0
        surface:
            type: y_plane
            plane_position: 10.0
        temperature_model: radiation

    - boundary_condition:
        solver_id: 0
        surface:
            type: z_plane
            plane_position: 1.0
        temperature_model: radiation


# ---------------------------------------------------------------------------
# Materials (thermal properties)
# ---------------------------------------------------------------------------
materials:
    - material:
        id: 0
        eos_model_type: decoupled
        eos_model: gamma_law_gas
        # strength_model: none
        dissipation_model: MARS
        dissipation_global_vars:
            - 1.0   # q1
            - 1.0   # q1ex
            - 1.333 # q2
            - 1.333 # q2ex
            - 0.0   # phi_min
            - 1.0   # phi_curl_min
        eos_global_vars:
            - 1.666666666666667
            - 1.0E-14
            - 1.0

       
# ---------------------------------------------------------------------------
# Regions (fills / initial conditions)
# ---------------------------------------------------------------------------
regions:
    - region:
        volume:
            type: global
        solver_id: 0
        material_id: 0
        density: 
            # Uniform density for thermal capacity (tonne/mm^3 with this setup’s scaling).
            type: uniform
            value: 8.93
        specific_internal_energy: 
            # Uniform specific internal energy (used by the solver; small non-zero background).
            type: uniform
            value: 1.e-10
        velocity: 
            # SGTM3D requires a nodal velocity fill. In this purely thermal test,
            # it is set to zero everywhere.
            type: cartesian
            u: 0.0
            v: 0.0
            w: 0.0
        thermal_conductivity: 
            # Uniform thermal conductivity (W/(cm*K) with the inline comment’s unit scaling).
            type: uniform
            value: 4.01 #W/(cm*K)
        specific_heat: 
            # Uniform specific heat (J/(g*K) as indicated by the inline comment).
            type: uniform
            value: 0.385 #903 #  0.385 #J/(g⋅K)
        temperature: 
            # Uniform initial nodal temperature (K).
            type: uniform
            value: 273.15 #K 


