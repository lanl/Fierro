
# ---------------------------------------------------------------------------
# Example Fierro input: Sedov blast with origin erosion
#
# Purpose
# - Runs a Sedov-like point explosion (initial internal energy source)
#   centered at the origin.
# - Uses two materials, where erosion is enabled only for the material
#   assigned to the explosion “source element” (material id 0).
#
# Assumed input scaling / units 
# - Mass: grams (g)
# - Length: centimeters (cm)
# - Time: micro second (microsecond)
# - Pressure / stress: MegaBar
# - Velocity: cm / micro second
# - Density: g / cm^3
#
# Erosion model notes
# - `erosion_model: basic` triggers erosion when:
#     pressure <= erode_tension_val  OR  density <= erode_density_val
#   See `BasicErosionModel::erode`.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Time integration / stepping control
# ---------------------------------------------------------------------------
dynamic_options:
    time_final: 4.25
    dt_min: 1.e-8
    dt_max: 1.e-2
    dt_start: 1.e-5
    cycle_stop: 30000


# ---------------------------------------------------------------------------
# Mesh options
# ---------------------------------------------------------------------------
mesh_options:
    source: generate
    num_dims: 3
    type: box
    # Box origin in x,y,z (cm).
    origin: [0.0, 0.0, 0.0]
    # Box lengths in x,y,z (cm).
    length: [1.2, 1.2, 1.2]
    num_elems: [12, 12, 12]


# ---------------------------------------------------------------------------
# Output / visualization controls
# ---------------------------------------------------------------------------
output_options:
    timer_output_level: thorough
    output_file_format: ensight
    # Visualization cadence in time units (microsecond).
    graphics_time_step: 0.1
    # graphics_iteration_step: 10

# ---------------------------------------------------------------------------
# Solver configuration
# ---------------------------------------------------------------------------
solver_options:
  - solver:
        method: dynx_FE
        id: 0
        # solver_vars:
        #  - blah
        #  - blah
        #  - blah

# ---------------------------------------------------------------------------
# Boundary conditions (velocity BCs)
# ---------------------------------------------------------------------------
boundary_conditions:
    # Tag X plane
    - boundary_condition:
        solver_id: 0
        surface: 
            type: x_plane
            plane_position: 0.0
        velocity_model: reflected
        velocity_bc_global_vars:
            - 1   # x
            - 0   # y
            - 0   # z

    # Tag Y plane
    - boundary_condition:
        solver_id: 0
        surface: 
            type: y_plane
            plane_position: 0.0
        velocity_model: reflected
        velocity_bc_global_vars:
            - 0   # x
            - 1   # y
            - 0   # z

    # Tag Z plane
    - boundary_condition:
        solver_id: 0
        surface: 
            type: z_plane
            plane_position: 0.0
        velocity_model: reflected
        velocity_bc_global_vars:
            - 0   # x
            - 0   # y
            - 1   # z   

# ---------------------------------------------------------------------------
# Materials
# ---------------------------------------------------------------------------
materials:
    - material:
        id: 0
        eos_model_type: decoupled
        eos_model: gamma_law_gas
        # strength_model: none
        dissipation_model: MARS
        dissipation_global_vars:
            - 1.0   # q1
            - 1.0   # q1ex
            - 1.333 # q2
            - 1.333 # q2ex
            - 0.0   # phi_min
            - 1.0   # phi_curl_min
        eos_global_vars:
            - 1.666666666666667
            - 1.0E-14
            - 1.0
        # Erosion enabled for this material (material id 0).
        # Basic erosion trigger:
        #   erode if pressure <= erode_tension_val OR density <= erode_density_val
        erosion_model: basic
        # Pressure threshold for erosion (MegaBar in this input scaling).
        erode_tension_val: 0.00003
        # Density threshold for erosion (g/cm^3 in this input scaling).
        erode_density_val: 0.02


    - material:
        id: 1
        eos_model_type: decoupled
        eos_model: gamma_law_gas
        # strength_model: none
        dissipation_model: MARS
        dissipation_global_vars:
            - 1.0   # q1
            - 1.0   # q1ex
            - 1.333 # q2
            - 1.333 # q2ex
            - 0.0   # phi_min
            - 1.0   # phi_curl_min
        eos_global_vars:
            - 1.666666666666667
            - 1.0E-14
            - 1.0
        # No erosion model specified for material id 1.

# ---------------------------------------------------------------------------
# Regions (initial conditions)
# ---------------------------------------------------------------------------
regions:
    - region:
        volume:
            type: global
        material_id: 0
        solver_id: 0
        density: 
            # Ambient initial density (g/cm^3 with input scaling).
            type: uniform
            value: 1.0
        specific_internal_energy: 
            # Ambient initial specific internal energy (sie).
            type: uniform        
            value: 0.001
        velocity: 
            # Initial velocity field (cartesian [u,v,w]).
            type: cartesian
            u: 0.0
            v: 0.0
            w: 0.0



    # -----------------------------------------------------------------------
    # Energy source initial conditions (Sedov-like blast)
    # -----------------------------------------------------------------------
    - region:
        volume:
            type: sphere
            # Explosion center at origin (cm).
            origin: [0.0, 0.0, 0.0]
            # Inner/outer radius defining the spherical source shell (cm).
            radius1: 0.0
            radius2: 0.1
        material_id: 0
        # IMPORTANT: the source is assigned to material id 0, which has
        # `erosion_model: basic`. Therefore erosion is active in the region
        # that receives the blast energy.
        solver_id: 0
        density: 
            # Source density (g/cm^3).
            type: uniform
            value: 1.0
        specific_internal_energy: 
            # Blast specific internal energy (sie).
            type: uniform
            value: 61.67375002 # 963.652344
        # ie: 0.25833839995946534 
        velocity: 
            type: cartesian
            u: 0.0
            v: 0.0
            w: 0.0